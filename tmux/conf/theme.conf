# ============================================================================
# TMUX Theme Configuration - Catppuccin Frappe with Custom Styling
# ============================================================================
# Custom theme with block pill style, centered windows, and color-coded memory
# Colors: Catppuccin Frappe palette
# ============================================================================

# Color Variables
FRAPPE_BG='#303446'
FRAPPE_FG='#ffffff'
BAR='#333353'
OMARCHY_BLUE='#8CA0E8'
DARK_OMARCHY_BLUE='#7287fd'

# ACTIVE='#7287fd'
# PREVIOUS=$DARK_OMARCHY_BLUE
# PREVIOUS='#8f97a8'
PREVIOUS='#6c76c2'
# PREVIOUS='#7c86c9'
ACTIVE=$DARK_OMARCHY_BLUE

INACTIVE='#5a5a7a'

# Status Bar Colors
set -g status-style "bg=$BAR,fg=$FRAPPE_FG"

# Window Styling
# Inactive windows: lighter gray text on Catppuccin Frappe background (blends with terminal)
set -g window-status-style "bg=default,fg=$INACTIVE"
# Active window: Omarchy blue text on Catppuccin Frappe background, no border
set -g window-status-current-style "bg=$FRAPPE_BG,fg=$ACTIVE,bold"
# Separator between windows with spacing
set -g window-status-separator '   '

# Window Format: "window-index:window-name" with zoom indicator; window name is bold across all tabs
# Zoom indicator appears when pane is zoomed
set -g window-status-format "#{?window_last_flag,#[fg=$PREVIOUS bold],}#{window_index}#{?window_zoomed_flag,,} #[bold]#{window_name}#[nobold,fg=#666e80]"
set -g window-status-current-format '#{window_index}#{?window_zoomed_flag,,} #[bold]#{window_name}#[nobold]'

# Align window list to the left (right after status-left)
set -g status-justify left

# Left side: session name - Omarchy blue normally, saturated red when prefix is pressed
set -g status-left "#[bg=#{?client_prefix,#e78284,$OMARCHY_BLUE},fg=#000000,bold] #{session_name} #{window_index}.#{pane_index} #[default]  "
set -g status-left-length 40

# Right side: Pomodoro timer (color-coded) | current working directory | memory usage
set -g status-right '#(~/dotfiles/tmux/scripts/path.sh)  #(~/dotfiles/tmux/scripts/memory.sh) #[default]'
set -g status-right-length 300
set -g status-interval 1
